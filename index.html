<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Grocery Bud is a small web app for keeping a shopping list; add, edit and remove items."
    />
    <meta
      name="keywords"
      content="grocery list, shopping list, groceries, shopping, list app, Grocery Bud"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Bud</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/single-item.css" />
    <link rel="stylesheet" href="css/items.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <section class="section-center">
      <div id="app"></div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/single-item.js"></script>
    <script src="js/items.js"></script>
    <script src="js/form.js"></script>
    <script src="js/app.js"></script>

    <div id="app">
      <div class="items">
        <div class="single-item">
          <input type="checkbox" checked />
          <p style="text-decoration: line-through" ;>milk</p>
          <button class="btn icon-btn edit-btn" type="button" title="Edit item">
            <i class="fa-regular fa-pen-to-square"></i>
          </button>
          <button
            class="btn icon-btn remove-btn"
            type="button"
            title="Remove item"
          >
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
        <div class="single-item">
          <input type="checkbox" checked />
          <p style="text-decoration: line-through">bread</p>
          <button class="btn icon-btn edit-btn" type="button" title="Edit item">
            <i class="fa-regular fa-pen-to-square"></i>
          </button>
          <button
            class="btn icon-btn remove-btn"
            type="button"
            title="Remove item"
          >
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
        <div class="single-item">
          <input type="checkbox" />
          <p style="text-decoration: none">eggs</p>
          <button class="btn icon-btn edit-btn" type="button" title="Edit item">
            <i class="fa-regular fa-pen-to-square"></i>
          </button>
          <button
            class="btn icon-btn remove-btn"
            type="button"
            title="Remove item"
          >
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
        <div class="single-item">
          <input type="checkbox" />
          <p>butter</p>
          <button class="btn icon-btn edit-btn" type="button" title="Edit item">
            <i class="fa-regular fa-pen-to-square"></i>
          </button>
          <button
            class="btn icon-btn remove-btn"
            type="button"
            title="Remove item"
          >
            <i class="fa-regular fa-trash-can"></i>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
