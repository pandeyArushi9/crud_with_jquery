<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="Grocery Bud is a small web app for keeping a shopping list; add, edit and remove items."
    />
    <meta
      name="keywords"
      content="grocery list, shopping list, groceries, shopping, list app, Grocery Bud"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Bud</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/items.css" />
    <link rel="stylesheet" href="css/single-item.css" />
    <link rel="stylesheet" href="css/form.css" />
  </head>
  <body>
    <section class="section-center">
      <div id="app">
        <form>
          <h2>Grocery Bud</h2>
          <div class="form-control">
            <input type="text" class="form-input" placeholder="e.g. eggs" />
            <button type="submit" class="btn">Add Item</button>
          </div>
        </form>
      </div>
    </section>

    <!-- JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/single-item.js"></script>
    <script src="js/items.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
